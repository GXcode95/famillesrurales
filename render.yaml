services:
  - type: web
    name: familles-rurales
    env: ruby
    plan: free
    buildCommand: bundle install && bundle exec rails assets:precompile && bundle exec rails assets:clean
    startCommand: ./bin/render-start
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"
      - key: RAILS_SERVE_STATIC_FILES
        value: "1"
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: familles-rurales-db
          property: connectionString
      - key: CONTACT_EMAIL
        value: xavier.grenouillet@gmail.com
      # Compte Gmail / Google Workspace + mot de passe d’application (voir Google Account → Sécurité)
      - key: SMTP_USER_NAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      # De préférence identique au compte SMTP ou alias « envoyer en tant que » validé dans Gmail
      - key: MAILER_FROM
        sync: false
      - key: APP_HOST
        value: famillesrurales.onrender.com

databases:
  - name: familles-rurales-db
    plan: free
