services:
  - type: web
    name: familles-rurales
    env: ruby
    plan: free
    buildCommand: bundle install && bundle exec rails assets:precompile && bundle exec rails assets:clean
    startCommand: ./bin/render-start
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "1"
      - key: RAILS_SERVE_STATIC_FILES
        value: "1"
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: familles-rurales-db
          property: connectionString
      - key: CONTACT_EMAIL
        value: xavier.grenouillet@gmail.com
      - key: RESEND_API_KEY
        sync: false
      # Adresse d’expéditeur : domaine vérifié dans Resend (ou onboarding@resend.dev pour les tests)
      - key: MAILER_FROM
        sync: false
      - key: APP_HOST
        value: famillesrurales.onrender.com

databases:
  - name: familles-rurales-db
    plan: free
